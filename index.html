<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DICKBUTT JUMP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.3em;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  #score-display {
    font-size: 1rem;
    margin-bottom: 8px;
    letter-spacing: 0.2em;
  }
  canvas {
    border: 3px solid #fff;
    background: #fff;
    display: block;
    image-rendering: pixelated;
  }
  #instructions {
    margin-top: 10px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    opacity: 0.6;
  }
  #game-over {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0,0,0,0.85);
    border: 3px solid #fff;
    padding: 30px 50px;
  }
  #game-over h2 { font-size: 2rem; margin-bottom: 10px; letter-spacing: 0.3em; }
  #game-over p { margin: 8px 0; font-size: 0.9rem; letter-spacing: 0.15em; }
  #game-over button {
    margin-top: 20px;
    padding: 10px 30px;
    background: #fff;
    color: #000;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    cursor: pointer;
  }
  #game-over button:hover { background: #ccc; }
</style>
</head>
<body>
<h1>DICKBUTT JUMP</h1>
<div id="score-display">SCORE: <span id="score">0</span> &nbsp; HIGH: <span id="hi">0</span></div>
<div style="position:relative">
<canvas id="c" width="700" height="400"></canvas>
<div id="game-over">
  <h2>GAME OVER</h2>
  <p>SCORE: <span id="final-score">0</span></p>
  <button onclick="restartGame()">PLAY AGAIN</button>
</div>
</div>
<div id="instructions">ARROW LEFT/RIGHT to move &nbsp;|&nbsp; SPACE or UP to jump &nbsp;|&nbsp; STOMP mushrooms!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 60;

// Game state
let score = 0, hiScore = 0, lives = 3, gameRunning = true, gameStarted = false;
let keys = {};
let camera = { x: 0 };

// World
const TILE = 40;
const levelWidth = 5000;

// Platform / mushroom data
let platforms = [];
let mushrooms = [];
let particles = [];
let worldOffset = 0; // scrolling offset

function generateLevel() {
  platforms = [];
  mushrooms = [];
  
  // Ground tiles
  for (let x = 0; x < levelWidth; x += TILE) {
    platforms.push({ x, y: GROUND, w: TILE, h: 60, type: 'ground' });
  }
  
  // Floating platforms - FIXED: reduced height range so they're reachable
  let px = 300;
  while (px < levelWidth - 400) {
    let pw = TILE * (2 + Math.floor(Math.random() * 4));
    // Changed from "GROUND - 80 - Math.random() * 150" to more reachable heights
    let py = GROUND - 60 - Math.random() * 80; // Now ranges from 60-140 pixels above ground
    platforms.push({ x: px, y: py, w: pw, h: TILE/2, type: 'platform' });
    
    // Mushroom on top?
    if (Math.random() > 0.3) {
      mushrooms.push({
        x: px + pw/2 - 20,
        y: py - 50,
        w: 40, h: 60,
        alive: true,
        bounce: 0
      });
    }
    px += pw + TILE * (2 + Math.random() * 3);
  }
  
  // Mushrooms on ground
  for (let x = 200; x < levelWidth - 400; x += 150 + Math.random() * 200) {
    if (Math.random() > 0.5) {
      mushrooms.push({ x, y: GROUND - 60, w: 40, h: 60, alive: true, bounce: 0 });
    }
  }
}

// Player
let player = {
  x: 100, y: GROUND - 60,
  vx: 0, vy: 0,
  w: 36, h: 52,
  onGround: false,
  facing: 1,
  dead: false,
  invincible: 0,
  animFrame: 0,
  animTimer: 0,
  lastWorldOffset: 0  // FIXED: Track last offset position for scoring
};

function resetPlayer() {
  player.x = 100; player.y = GROUND - 60;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  player.dead = false;
  player.invincible = 60;
  player.lastWorldOffset = worldOffset;  // FIXED: Reset to current offset
}

generateLevel();

let dbImgLoaded = false;
dbImg.onload = () => { dbImgLoaded = true; };

function drawDickbutt(x, y, facing, dead) {
  if (!dbImgLoaded) return;
  ctx.save();
  ctx.translate(x + player.w / 2, y + player.h);
  if (facing > 0) ctx.scale(-1, 1);
  if (dead) ctx.rotate(Math.PI);
  // Draw the PNG: it's ~square, scale to fit player hitbox
  const sw = player.w * 2.2;
  const sh = player.h * 2.2;
  ctx.drawImage(dbImg, -sw/2, -sh, sw, sh);
  ctx.restore();
}


function drawMushroom(m) {
  if (!m.alive) return;
  ctx.save();
  ctx.translate(m.x + m.w/2, m.y + m.h + m.bounce);
  
  // Stem
  ctx.fillStyle = '#555';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-9, -30, 18, 30, 3);
  ctx.fill();
  ctx.stroke();
  // Stem spots
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.ellipse(-2, -22, 4, 2.5, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4, -12, 3, 3, -0.2, 0, Math.PI*2);
  ctx.fill();
  
  // Cap
  ctx.fillStyle = '#222';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(0, -30, 22, 16, 0, Math.PI, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // Cap spots
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-9, -36, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -29, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -42, 4, 0, Math.PI*2);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-6, -28, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -28, 3, 0, Math.PI*2);
  ctx.fill();
  // angry brows
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-10, -33); ctx.lineTo(-3, -31);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10, -33); ctx.lineTo(3, -31);
  ctx.stroke();

  // Feet
  ctx.fillStyle = '#444';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  // Left foot
  ctx.beginPath();
  ctx.ellipse(-8, -2, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
  // Right foot
  ctx.beginPath();
  ctx.ellipse(8, -2, 5, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
 
  ctx.restore();
}

function drawBackground() {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  
  // Sky dithering / stars
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let i = 0; i < 30; i++) {
    let bx = ((i * 137 + worldOffset * 0.1) % W);
    let by = (i * 73) % (GROUND - 20);
    ctx.fillRect(bx, by, 2, 2);
  }
  
  // Ground
  ctx.fillStyle = '#222';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  // Ground details
  ctx.fillStyle = '#444';
  for (let x = -worldOffset % (TILE*2); x < W + TILE; x += TILE*2) {
    ctx.fillRect(x, GROUND, TILE, 8);
    ctx.fillRect(x + TILE, GROUND + 8, TILE, 8);
  }
}

function drawPlatforms() {
  platforms.forEach(p => {
    let sx = p.x - worldOffset;
    if (sx > W + 100 || sx + p.w < -100) return;
    if (p.type === 'ground') return; // drawn by background
    
    ctx.fillStyle = '#333';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(sx, p.y, p.w, p.h, 4);
    ctx.fill();
    ctx.stroke();
    // Top highlight
    ctx.fillStyle = '#555';
    ctx.fillRect(sx + 4, p.y + 3, p.w - 8, 4);
  });
}

function spawnParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      size: 3 + Math.random() * 5
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
  });
}

function drawParticles() {
  particles.forEach(p => {
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(p.x - worldOffset - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (!gameRunning) return;

  // Input
  const speed = 4;
  const friction = 0.8;
  
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
    player.vx -= 1.5;
    player.facing = -1;
  }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    player.vx += 1.5;
    player.facing = 1;
  }
  player.vx *= friction;
  player.vx = Math.max(-speed, Math.min(speed, player.vx));
  
  if ((keys['ArrowUp'] || keys[' '] || keys['w'] || keys['W']) && player.onGround) {
    player.vy = -12;
    player.onGround = false;
  }
  
  // Gravity
  player.vy += 0.5;
  player.vy = Math.min(player.vy, 14);

  // --- Move X, resolve X collisions with platforms ---
  player.x += player.vx;
  platforms.forEach(p => {
    // All collision in world coordinates (player.x is world x)
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y < p.y + p.h) {
      if (player.vx > 0) {
        player.x = p.x - player.w;
      } else if (player.vx < 0) {
        player.x = p.x + p.w;
      }
      player.vx = 0;
    }
  });

  // --- Move Y, resolve Y collisions with platforms ---
  player.onGround = false;
  player.y += player.vy;
  platforms.forEach(p => {
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y < p.y + p.h) {
      if (player.vy > 0) {
        // Landing on top
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        // Hitting underside
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  });

  // Animation
  if (player.onGround && Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > 5) { player.animFrame++; player.animTimer = 0; }
  }
  if (player.invincible > 0) player.invincible--;

  // Move mushrooms
  mushrooms.forEach(m => {
    if (!m.alive) return;
    m.x -= 0.8;
    m.bounce = Math.sin(Date.now() * 0.005) * 2;
  });

  // Mushroom collision (all world coordinates)
  mushrooms.forEach(m => {
    if (!m.alive) return;
    // AABB in world space
    if (player.x + player.w <= m.x || player.x >= m.x + m.w) return;
    if (player.y + player.h <= m.y || player.y >= m.y + m.h) return;

    // Stomp: player falling AND player's bottom edge is in the top half of the mushroom
    if (player.vy >= 0 && (player.y + player.h) < (m.y + m.h * 0.55)) {
      m.alive = false;
      score += 100;
      document.getElementById('score').textContent = score;
      player.vy = -9;
      player.y = m.y - player.h;
      spawnParticles(m.x + m.w/2, m.y + m.h/2);
    } else if (player.invincible <= 0) {
      // Side or bottom hit
      lives--;
      player.invincible = 90;
      player.vy = -8;
      player.vx = player.facing * -3;
      if (lives <= 0) {
        gameRunning = false;
        if (score > hiScore) hiScore = score;
        document.getElementById('hi').textContent = hiScore;
        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over').style.display = 'block';
      }
    }
  });
  
  // Scroll camera
  let targetOffset = player.x - W * 0.35;
  worldOffset += (targetOffset - worldOffset) * 0.1;
  worldOffset = Math.max(0, worldOffset);
  
  // Fall off world
  if (player.y > H + 100) {
    lives--;
    player.invincible = 90;
    worldOffset = Math.max(0, player.x - W * 0.35 - 100);
    resetPlayer();
    if (lives <= 0) {
      gameRunning = false;
      if (score > hiScore) hiScore = score;
      document.getElementById('hi').textContent = hiScore;
      document.getElementById('final-score').textContent = score;
      document.getElementById('game-over').style.display = 'block';
    }
  }
  
  // FIXED: Score for distance - only award points for forward progress
  if (gameRunning && worldOffset > player.lastWorldOffset) {
    let distanceTraveled = worldOffset - player.lastWorldOffset;
    let pointsToAdd = Math.floor(distanceTraveled / 50);
    if (pointsToAdd > 0) {
      score += pointsToAdd;
      player.lastWorldOffset += pointsToAdd * 50;  // Update by the exact amount we scored
      document.getElementById('score').textContent = score;
    }
  }
  
  updateParticles();
}

function drawHUD() {
  ctx.fillStyle = '#000';
  ctx.font = 'bold 16px Courier New';
  ctx.fillText('♥'.repeat(Math.max(0, lives)), 10, 25);
}

function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawPlatforms();
  
  // Draw mushrooms
  mushrooms.forEach(m => {
    if (!m.alive) return;
    let mx = { ...m, x: m.x - worldOffset };
    if (mx.x > -50 && mx.x < W + 50) drawMushroom(mx);
  });
  
  // Draw player (flicker if invincible)
  if (!player.dead && (player.invincible <= 0 || Math.floor(player.invincible / 5) % 2 === 0)) {
    drawDickbutt(player.x - worldOffset, player.y, player.facing, player.dead);
  }
  
  drawParticles();
  drawHUD();
  
  update();
  requestAnimationFrame(gameLoop);
}

function restartGame() {
  score = 0;
  lives = 3;
  gameRunning = true;
  worldOffset = 0;
  particles = [];
  document.getElementById('score').textContent = 0;
  document.getElementById('game-over').style.display = 'none';
  generateLevel();
  resetPlayer();
  player.lastWorldOffset = 0;  // Reset distance tracking
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
let touchStartX = 0;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  let dx = e.touches[0].clientX - touchStartX;
  keys['ArrowLeft'] = dx < -20;
  keys['ArrowRight'] = dx > 20;
}, { passive: false });
canvas.addEventListener('touchend', () => {
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  keys[' '] = true;
  setTimeout(() => keys[' '] = false, 100);
});

gameLoop();
</script>
</body>
</html>
